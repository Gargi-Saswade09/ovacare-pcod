<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password | OvaCare</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f7f7f7;
        }

        .box{
            background:#f29c9c;
            padding:45px;
            width:420px;
            border-radius:20px;
            box-shadow:0 20px 40px rgba(0,0,0,0.25);
            text-align:center;
            animation:fadeIn 0.8s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(40px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        h2{
            margin-bottom:10px;
        }

        .sub-text{
            font-size:14px;
            color:#444;
            margin-bottom:18px;
        }

        input{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            margin:10px 0;
            font-size:15px;
        }

        input:focus{
            outline:none;
            box-shadow:0 0 0 3px rgba(255,95,115,0.25);
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#ff5f73;
            color:white;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
            transition:0.3s;
        }

        button:hover{
            background:#ff4757;
            transform:scale(1.03);
        }

        .flash-message{
            background:#fff3f4;
            color:#b00020;
            border:1px solid #f3b3bb;
            padding:10px 12px;
            border-radius:8px;
            margin-bottom:15px;
            font-size:14px;
        }

        .links{
            margin-top:15px;
            font-size:14px;
        }

        .links a{
            text-decoration:none;
            color:#c8003d;
            font-weight:500;
        }

        .links a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Forgot Password</h2>
        <p class="sub-text">Enter your registered email to receive an OTP</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <p class="flash-message">{{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('forgot_password') }}" method="post">
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Send Reset OTP</button>
        </form>

        <div class="links">
            <p>Remember your password?</p>
            <a href="{{ url_for('login') }}">Back to Login</a>
        </div>
    </div>
</body>
</html>
